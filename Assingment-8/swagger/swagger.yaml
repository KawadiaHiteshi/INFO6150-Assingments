openapi: 3.0.0
info:
  title: Assignment 8 User API
  version: 1.0.0
  description: RESTful API for user management and image upload using Node.js, Express, and MongoDB

servers:
  - url: http://localhost:5050

paths:
  /:
    get:
      summary: Root API check
      responses:
        '200':
          description: API is running

  /user/create:
    post:
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fullName
                - email
                - password
              properties:
                fullName:
                  type: string
                  example: John Doe
                email:
                  type: string
                  example: john@example.com
                password:
                  type: string
                  example: John@123
      responses:
        '201':
          description: User created successfully
        '400':
          description: Validation failed

  /user/edit:
    put:
      summary: Update user details
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - fullName
                - password
              properties:
                email:
                  type: string
                  example: john@example.com
                fullName:
                  type: string
                  example: John Smith
                password:
                  type: string
                  example: NewPass@123
      responses:
        '200':
          description: User updated successfully
        '400':
          description: Validation failed
        '404':
          description: User not found

  /user/delete:
    delete:
      summary: Delete a user by email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  example: john@example.com
      responses:
        '200':
          description: User deleted successfully
        '404':
          description: User not found

  /user/getAll:
    get:
      summary: Retrieve all users
      responses:
        '200':
          description: List of all users

  /user/uploadImage:
    post:
      summary: Upload one image for a user
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - email
                - image
              properties:
                email:
                  type: string
                  example: john@example.com
                image:
                  type: string
                  format: binary
      responses:
        '201':
          description: Image uploaded successfully
        '400':
          description: Invalid file format or image already exists
        '404':
          description: User not found