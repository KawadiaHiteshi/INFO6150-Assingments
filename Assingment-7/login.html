<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Login to Aura Wellness Studio." />
  <title>Aura Wellness Studio | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css" />
</head>
<body class="auth-page">
  <div class="page-glow glow-one"></div>
  <div class="page-glow glow-two"></div>

  <main class="auth-shell">
    <section class="auth-panel reveal-up">
      <div class="auth-brand">
        <a href="login.html" class="logo">Aura<span>Wellness</span></a>
        <span class="eyebrow">Welcome Back</span>
        <h1>Login to continue your wellness journey</h1>
        <p>Access your member area, class schedules, and premium studio experience.</p>
      </div>

      <form id="loginForm" class="auth-form" novalidate>
        <div class="input-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="Enter your email" required>
        </div>
        <div class="input-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" required>
        </div>
        <p id="loginMessage" class="form-message"></p>
        <button type="submit" class="btn btn-primary full-width">Login</button>
      </form>

      <div class="auth-links">
        <p>Don't have an account? <a href="register.html">Create account</a></p>
      </div>
    </section>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
